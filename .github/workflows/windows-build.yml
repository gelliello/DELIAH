name: DELIAH Windows Build

on:
  push:
    branches: [master]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Install Node dependencies
        working-directory: apps/windows
        run: npm install

      - name: Build Frontend
        working-directory: apps/windows
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Desktop App (Tauri)
        working-directory: apps/windows
        run: npm run tauri build

      - name: Package Release
        shell: pwsh
        run: |
          $tag = "Auto-Build-${{ github.run_number }}"
          $releaseDir = "apps\windows\src-tauri\target\release"
          $stagingDir = "release-staging"

          New-Item -ItemType Directory -Path $stagingDir -Force

          # Find the built exe
          $exe = Join-Path $releaseDir "deliah-desktop.exe"
          if (Test-Path $exe) {
            Copy-Item $exe "$stagingDir\DELIAH-Windows-${tag}-Portable.exe"
            Write-Output "Found portable exe"
          } else {
            Write-Output "Looking for exe files..."
            Get-ChildItem $releaseDir -Filter "*.exe" | ForEach-Object {
              Write-Output $_.FullName
            }
          }

          # Also check bundle directory for installers
          $bundleDir = Join-Path $releaseDir "bundle"
          if (Test-Path $bundleDir) {
            Get-ChildItem $bundleDir -Recurse -Filter "*.msi" | ForEach-Object {
              Copy-Item $_.FullName "$stagingDir\DELIAH-Windows-${tag}.msi"
              Write-Output "Found MSI: $($_.Name)"
            }
            Get-ChildItem $bundleDir -Recurse -Filter "*.exe" | Where-Object { $_.Name -ne "deliah-desktop.exe" } | ForEach-Object {
              Copy-Item $_.FullName "$stagingDir\DELIAH-Windows-${tag}-Setup.exe"
              Write-Output "Found NSIS: $($_.Name)"
            }
          }

          # Create zip
          Compress-Archive -Path "$stagingDir\*" -DestinationPath "$stagingDir\DELIAH-Windows-${tag}.zip"

          Write-Output "`nStaged files:"
          Get-ChildItem $stagingDir

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Auto-Build-${{ github.run_number }}
          name: "Auto-Build ${{ github.run_number }} - Windows"
          body: |
            ## DELIAH Windows Desktop App

            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Installation
            - Download and run `DELIAH-Windows-Auto-Build-${{ github.run_number }}-Portable.exe`

            ### Requirements
            - [Ollama](https://ollama.ai) installed and running
            - Python 3.11+ (for backend)
          files: release-staging/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
