name: DELIAH Windows Build

on:
  push:
    branches: [master]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Install Node dependencies
        working-directory: apps/windows
        run: npm install

      - name: Build Frontend
        working-directory: apps/windows
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Desktop App (Tauri)
        working-directory: apps/windows
        run: npm run tauri build

      - name: Package Release Assets
        shell: pwsh
        run: |
          $tag = "Auto-Build-${{ github.run_number }}"
          $bundleDir = "apps\windows\src-tauri\target\release\bundle"

          if (-not (Test-Path $bundleDir)) {
            Write-Output "Bundle directory not found, checking alternatives..."
            Get-ChildItem "apps\windows\src-tauri\target\release" -Directory
            exit 1
          }

          New-Item -ItemType Directory -Path "$bundleDir\staging" -Force

          if (Test-Path "$bundleDir\msi\*.msi") {
            Copy-Item "$bundleDir\msi\*.msi" "$bundleDir\staging\DELIAH-Windows-${tag}.msi"
          }

          if (Test-Path "$bundleDir\nsis\*.exe") {
            Copy-Item "$bundleDir\nsis\*.exe" "$bundleDir\staging\DELIAH-Windows-${tag}-Setup.exe"
          }

          if (Test-Path "apps\windows\src-tauri\target\release\deliah-desktop.exe") {
            Copy-Item "apps\windows\src-tauri\target\release\deliah-desktop.exe" "$bundleDir\staging\DELIAH-Windows-${tag}-Portable.exe"
          }

          Compress-Archive -Path "$bundleDir\staging\*" -DestinationPath "$bundleDir\staging\DELIAH-Windows-${tag}.zip"

          Write-Output "Staged files:"
          Get-ChildItem "$bundleDir\staging"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Auto-Build-${{ github.run_number }}
          name: "Auto-Build ${{ github.run_number }} - Windows"
          body: |
            ## DELIAH Windows Desktop App

            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Installation
            1. Download `DELIAH-Windows-Auto-Build-${{ github.run_number }}-Setup.exe` for installer
            2. Or download `DELIAH-Windows-Auto-Build-${{ github.run_number }}-Portable.exe` for portable

            ### Requirements
            - [Ollama](https://ollama.ai) installed and running
            - Python 3.11+ (for backend)
          files: |
            apps/windows/src-tauri/target/release/bundle/staging/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
