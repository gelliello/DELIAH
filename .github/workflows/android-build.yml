name: DELIAH Android Build

on:
  push:
    branches: [master]

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: apps/android
        run: flutter pub get

      - name: Run tests
        working-directory: apps/android
        run: flutter test
        continue-on-error: true

      - name: Build APK
        working-directory: apps/android
        run: flutter build apk --release

      - name: Build AAB
        working-directory: apps/android
        run: flutter build appbundle --release

      - name: Package Release Assets
        working-directory: apps/android/build/app/outputs
        run: |
          TAG="Auto-Build-${{ github.run_number }}"
          mkdir -p staging

          cp flutter-apk/app-release.apk "staging/DELIAH-Android-${TAG}.apk"
          cp bundle/release/app-release.aab "staging/DELIAH-Android-${TAG}.aab"

          cd staging && zip "DELIAH-Android-${TAG}.zip" *.apk *.aab

          echo "Staged files:"
          ls -la staging/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Auto-Build-${{ github.run_number }}
          name: "Auto-Build ${{ github.run_number }} - Android"
          body: |
            ## DELIAH Android Companion App

            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Installation
            1. Download `DELIAH-Android-Auto-Build-${{ github.run_number }}.apk` and install
            2. For Play Store: use `DELIAH-Android-Auto-Build-${{ github.run_number }}.aab`

            ### Requirements
            - DELIAH Desktop running on your PC
            - Both devices on the same network
          files: |
            apps/android/build/app/outputs/staging/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
